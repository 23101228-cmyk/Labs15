name: React CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

  tests:
    name: Run Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npm run test

  deploy:
    name: Deploy
    needs: tests
    runs-on: ubuntu-latest

    outputs:
      vercel_url: ${{ steps.deploy-vercel.outputs.DEPLOY_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy-vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          URL=$(npx vercel --prod --yes --token "$VERCEL_TOKEN" | tail -n 1)
          echo "DEPLOY_URL=$URL" >> "$GITHUB_OUTPUT"

  cypress-e2e:
    name: Cypress E2E Tests
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Cypress repo
        uses: actions/checkout@v4
        with:
          repository: '23101228-cmyk/cypress15'
          token: ${{ secrets.MI_GITHUB_TOKEN_REPOS }}
          path: cypress-tests

      - name: Set up Node.js for Cypress
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cypress dependencies
        run: npm install
        working-directory: cypress-tests

      - name: Debug URL
        run: echo "La URL recibida de Vercel es ${{ needs.deploy.outputs.vercel_url }}"

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_BASE_URL: ${{ needs.deploy.outputs.vercel_url }}
        with:
          working-directory: cypress-tests
          install: false
          component: false
          record: false
          publish-summary: true

      - name: Subir todos los screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-screenshots
          path: cypress-tests/cypress/screenshots/
          if-no-files-found: warn
